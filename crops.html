">

        <div class="logo">
            <h1>RAYP</h1>
            <p>Farm Management System</p>
        </div>

        <nav class="nav-menu">

            <a href="dashboard.html" class="active">
                🏠 <span>Dashboard</span>
            </a>

            <a href="income.html">

            <a href="expenses.html">

            <a href="workers.html">

 <main class="main">

<div class="user-profile">
    <img id="userPhoto" src="" alt="Profile Photo">
</div>
<h2>Crop Records</h2>

<div class="form-section">

    <input type="text"
           id="crop"
           placeholder="Crop Name">

    <input type="number"
           id="acreage"
           placeholder="Acreage">

    <input type="date"
           id="planted">

    <button onclick="addCrop()">
        Add Crop
    </button>

</div>

<table>

    <thead>
        <tr>
            <th>Crop</th>
            <th>Acreage</th>
            <th>Planting Date</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="cropTable"></tbody>

</table>

<script src="crops.js"></script>
<script src="auth.js"></script>
