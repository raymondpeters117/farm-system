<h2>Crop Records</h2>

<div class="form-section">

           id="crop"
           placeholder="Crop Name">

    <input type="number"
           id="acreage"
           placeholder="Acreage">

    <input type="date"
           id="planted">

    <button onclick="addCrop()">
        Add Crop
    </button>

</div>

<table>

    <thead>
        <tr>
            <th>Crop</th>
            <th>Acreage</th>
            <th>Planting Date</th>
            <th>Action</th>
        </tr>
    </thead>
