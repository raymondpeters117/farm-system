<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | RAYP Farm</title>
 <body style="
    background-image: url('Download free image of photo of soil bag laying on the ground_ about garden soil bag, garden, potted plant, leaf, and tree 12581670.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h1>RAYP</h1>
            <p>Farm Management System</p>
        </div>

        <nav class="nav-menu">

            <a href="dashboard.html">🏠 Dashboard</a>
            <a href="income.html">💰 Income</a>
            <a href="expenses.html">💸 Expenses</a>
            <a href="workers.html">👨‍🌾 Workers</a>
            <a href="inventory.html">📦 Inventory</a>
            <a href="crops.html">🌱 Crops</a>
            <a href="reports.html">📊 Reports</a>
            <a href="settings.html" class="active">⚙️ Settings</a>

        </nav>

        <div class="sidebar-footer">
            <button class="btn-danger" onclick="logout()">
                🚪 Logout
            </button>
        </div>

    </aside>

    <!-- Main Content -->
    <main class="main">

        <!-- Header -->
        <div class="top-bar">

            <h2>⚙️ User Management</h2>

            <div class="user-profile">
                <img id="userPhoto"
                     src="images/default-profile.png"
                     alt="Profile Photo">
            </div>

        </div>

        <!-- Create Account -->
        <div class="settings-card">

            <h3>Create New Account</h3>

            <div class="account-section">

                <input type="text" id="fullName" placeholder="Full Name" required>

                <input type="text" id="username" placeholder="Username" required>

                <input type="password" id="password" placeholder="Password" required>

                <select id="role">
                    <option value="Admin">Admin</option>
                    <option value="Cashier">Cashier</option>
                </select>

                <label>Profile Picture</label>
                <input type="file" id="profilePhoto" accept="image/*">

                <img id="previewImage"
                     src=""
                     alt="Preview"
                     style="width:120px;height:120px;border-radius:50%;display:none;object-fit:cover;margin-top:10px;">

                <button onclick="saveAccount()">
                    💾 Save Account
                </button>

            </div>

        </div>

        <!-- Saved Accounts -->
        <div class="accounts-list">

            <h3>Saved Accounts</h3>

            <div id="accountsList">
                <!-- Dynamic accounts appear here -->
            </div>

        </div>

    </main>

</div>

<script src="settings.js"></script>
<script src="auth.js"></script>
<script src="profile.js"></script>

</body>
</html>
