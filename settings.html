<h2>User Management</h2>
<section class="settings-card">
    <h2>Create New Account</h2>

    <input type="text" id="newUsername" placeholder="Username">

    <input type="password" id="newPassword" placeholder="Password">

    <select id="newRole">
        <option value="admin">Admin</option>
        <option value="cashier">Cashier</option>
    </select>

    <button onclick="createAccount()">Save Account</button>

    <h3>Saved Accounts</h3>
    <div id="accountsList">
        <div class="account-item">
            <p><strong>Rayp</strong> (admin)</p>
            <button onclick="deleteAccount(0)">
                Delete
            </button>
        </div>
        </div>
</section>
<table>

    <thead>
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="userTable"></tbody>

</table>
<div class="change-password-box">
    <h3>Change Password</h3>

    <input type="text" id="cpUsername" placeholder="Username">

    <input type="password" id="oldPassword" placeholder="Current Password">

    <input type="password" id="newPasswordChange" placeholder="New Password">

    <button onclick="changePassword()">
        Change Password
    </button>
</div>
<div class="account-item">
    <p>
        <strong>${user.username}</strong>
        (${user.role})
        <br>
        Password: ${user.password}
    </p>

    <button onclick="deleteAccount(${index})">
        Delete
    </button>
</div>
