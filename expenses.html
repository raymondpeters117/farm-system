<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            padding:30px;
        }

        .container{
            width:95%;
            max-width:1100px;
            margin:auto;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        form{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:15px;
            margin-bottom:25px;
        }

        input,
        select,
        button{
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        table th{
            background:#007bff;
            color:white;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }

        .delete-btn{
            background:red;
            color:white;
            padding:8px 14px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .delete-btn:hover{
            background:darkred;
        }

        @media(max-width:700px){

            table{
                font-size:13px;
            }

            form{
                grid-template-columns:1fr;
            }
            nav{
    background:#1B5E20;
    color:white;
    padding:15px;
}

        }
    </style>
</head>

<body>
<nav>
        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="income.html">Income</a></li>

            <li><a href="expenses.html">Expenses</a></li>

            <li><a href="workers.html">Workers</a></li>

            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="crops.html">Crops</a></li>

            <li><a href="reports.html">Reports</a></li>

            <li><a href="settings.html">Settings</a></ul>
<button onclick="logout()">Logout</button>
</nav>
<div class="container">

<h1>Expense Tracker</h1>

<form id="expenseForm">

    <input
        type="text"
        id="item"
        placeholder="Enter Item"
        required>

    <select id="category" required>
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Education">Education</option>
        <option value="Medical">Medical</option>
        <option value="Shopping">Shopping</option>
        <option value="Rent">Rent</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
    </select>

    <input
        type="number"
        id="amount"
        placeholder="Amount"
        required>

    <input
        type="date"
        id="date"
        required>

    <button type="submit">
        Save Expense
    </button>

</form>

<table>

<thead>

<tr>
    <th>#</th>
    <th>Item</th>
    <th>Category</th>
    <th>Amount</th>
    <th>Date</th>
    <th>Action</th>
</tr>

</thead>

<tbody id="expenseTableBody">

</tbody>

</table>

</div>

<script src="expense.js"></script>

</body>
</html>
