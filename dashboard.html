<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYP Dashboard</title>

    <link rel="stylesheet" href="style.css">
     <body style="
    background-image: url('Download free image of photo of soil bag laying on the ground_ about garden soil bag, garden, potted plant, leaf, and tree 12581670.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
">
</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h1>RAYP</h1>
            <p>Farm Management System</p>
        </div>

        <nav class="nav-menu">
            <a href="dashboard.html" class="active">🏠 Dashboard</a>
            <a href="income.html">💰 Income</a>
            <a href="expenses.html">💸 Expenses</a>
            <a href="workers.html">👨‍🌾 Workers</a>
            <a href="inventory.html">📦 Inventory</a>
            <a href="crops.html">🌱 Crops</a>
            <a href="reports.html">📊 Reports</a>
            <a href="settings.html">⚙️ Settings</a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-danger" onclick="logout()">🚪 Logout</button>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <div class="top-bar">

            <h2>📊 Dashboard Overview</h2>

            <div class="user-profile">
                <img id="userPhoto" src="images/default-profile.png" alt="Profile">
            </div>

        </div>

        <!-- CARDS -->
        <div class="cards">

            <div class="summary-card">
                <h3>Total Income</h3>
                <h2 id="totalIncome">UGX 0</h2>
            </div>

            <div class="summary-card">
                <h3>Total Expenses</h3>
                <h2 id="totalExpenses">UGX 0</h2>
            </div>

            <div class="summary-card">
                <h3>Balance</h3>
                <h2 id="totalProfit">UGX 0</h2>
            </div>

            <div class="summary-card">
                <h3>Total Workers</h3>
                <h2 id="totalWorkers">0</h2>
            </div>

        </div>

    </main>

</div>

<script src="dashboard.js"></script>
<script src="auth.js"></script>
<script src="profile.js"></script>

</body>
</html>
