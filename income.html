<section class="form-section">

    <form id="incomeForm">

        <input type="text"
               id="source"
               placeholder="Income Source"

               id="date"
               required>

        </button>

</section>

    <table>

        <thead>
            <tr>
                <th>Source</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        </tbody>

    </table>
