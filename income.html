<div class="sidebar-user">
	
</div>
	<div class="user-profile">
    <img id="userPhoto" src="" alt="Profile Photo">
</div>
<section class="page-header">
    <h1 class="auto-style2" style="border-radius: 15px; border: medium solid #FF0000; s; width: 258px; background-color: #008000; line-height: normal; vertical-align: text-top; font-family: 'comic Sans MS'; font-size: x-large; font-weight: bold; color: #FFFF00;">Income Records</h1>
</section>

<section class="form-section">

    <form id="incomeForm">

        <input type="text"
               id="source"
               placeholder="Income Source"
               required>

        <input type="number"
               id="amount"
               placeholder="Amount"
               required>

        <input type="date"
               id="date"
               required>

        <button type="submit">
            Add Income
        </button>

    </form>

</section>

<section class="table-section">

    <input type="text"
           id="searchIncome"
           placeholder="Search Income">

    <table>

        <thead>
            <tr>
                <th>Source</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="incomeTable">
        </tbody>

    </table>

</section>
<script src="auth.js"></script>

<script src="income.js"></script>
