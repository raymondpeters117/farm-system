<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Management</title>
    <link rel="stylesheet" href="style.css">
    <body style="
    background-image: url('Acelere o tempo_ plantas que crescem em um piscar___.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h1>RAYP</h1>
            <p>Farm Management System</p>
        </div>

        <nav class="nav-menu">
            <a href="dashboard.html">🏠 <span>Dashboard</span></a>
            <a href="income.html" class="active">💰 <span>Income</span></a>
            <a href="expenses.html">💸 <span>Expenses</span></a>
            <a href="workers.html">👨‍🌾 <span>Workers</span></a>
            <a href="inventory.html">📦 <span>Inventory</span></a>
            <a href="crops.html">🌱 <span>Crops</span></a>
            <a href="reports.html">📊 <span>Reports</span></a>
            <a href="settings.html">⚙️ <span>Settings</span></a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-danger" onclick="logout()">
                🚪 Logout
            </button>
        </div>

    </aside>

    <!-- Main Content -->
    <main class="main">

        <div class="top-bar">
            <div class="user-profile">
                <img id="userPhoto" src="images/default-profile.png" alt="Profile Photo">
            </div>
        </div>

        <section class="page-header">
            <h1 class="page-title">Income Records</h1>
        </section>

        <section class="form-section">

            <form id="incomeForm">

                <input
                    type="text"
                    id="source"
                    placeholder="Income Source"
                    autocomplete="off"
                    required>

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount (UGX)"
                    min="1"
                    required>

                <input
                    type="date"
                    id="date"
                    required>

                <button type="submit">
                    ➕ Add Income
                </button>

            </form>

        </section>

        <section class="table-section">

            <input
                type="text"
                id="searchIncome"
                placeholder="🔍 Search Income">

            <table>

                <thead>
                    <tr>
                        <th>Source</th>
                        <th>Amount (UGX)</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="incomeTable"></tbody>

            </table>

        </section>

    </main>

</div>

<script src="auth.js"></script>
<script src="profile.js"></script>
<script src="income.js"></script>

</body>
</html>
